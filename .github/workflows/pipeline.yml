name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # We spin up Redis because your RateLimiting tests will need it!
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 1. LINTING (Checkstyle)
      # This ensures your code follows standard Java formatting
      - name: Run Checkstyle
        run: mvn checkstyle:check
        continue-on-error: false

      # 2. TESTS
      # This runs JUnit tests. If one fails, the PR cannot be merged.
      - name: Run Unit & Integration Tests
        run: mvn test
        env:
          # Tell the tests to use the Redis service we started above
          SPRING_DATA_REDIS_URL: redis://localhost:6379

      # 3. BUILD CHECK
      # This confirms the JAR can be packaged without errors
      - name: Build with Maven
        run: mvn clean package -DskipTests