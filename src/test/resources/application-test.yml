JWT_SECRET_KEY: "ThisIsADummySecretKeyForTestingPurposesOnlyItShouldBeLong"

spring:
  data:
    redis:
      # This works in GitHub Actions because the 'service' is on localhost
      url: redis://localhost:6379
  datasource:
    # Use H2 for fast tests so you don't need a real Postgres running locally
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop