spring.application.name=profiler
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:stage3db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

spring.security.user.name=profiler
spring.security.user.password=profiler

profiler.security.jwt-secret-key=${JWT_SECRET_KEY}

github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}
github.cli.client.id=${CLI_CLIENT_ID}
github.cli.client.secret=${CLI_CLIENT_SECRET}
github.redirect.uri=http://localhost:8080/auth/github/callback
github.cli.redirect.uri=http://localhost:9095/callback